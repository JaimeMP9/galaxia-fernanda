<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>Fernanda</title>

    <meta name="description"
        content="Para la mujer más hermosa del universo 💘">

    <meta property="og:title" content="Fernanda">
    <meta property="og:description"
        content="Una galaxia interactiva con palabras de cariño 💖">

    <meta property="og:image" content="og-cover.png">

    <link rel="icon"
        type="image/png"
        href="https://baque2005.github.io/public-files/files/favicon.png">

    <!-- =========================
         ESTILOS
    ========================== -->

    <style>

        html,
        body{
            margin:0;
            height:100%;
            background:#000;
            overflow:hidden;
        }

        #galaxy-canvas{
            position:fixed;
            inset:0;
            width:100%;
            height:100%;
            display:block;
            touch-action:none;
        }

        .pill{
            position:fixed;
            top:10px;
            left:50%;
            transform:translateX(-50%);

            padding:6px 12px;
            border-radius:999px;

            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.18);

            color:#fff;
            font:12px system-ui;
        }

        .attribution{
            position:fixed;
            left:10px;
            bottom:10px;

            font-size:11px;
            color:#b9a0ff;

            opacity:.8;

            background:rgba(0,0,0,.35);

            padding:6px 8px;
            border-radius:8px;
        }

        .player{
            position:fixed;
            left:10px;
            right:10px;
            bottom:10px;

            display:flex;
            gap:8px;
            align-items:center;

            padding:8px;

            color:#fff;

            background:rgba(20,15,35,.35);

            border:1px solid rgba(255,255,255,.12);
            border-radius:12px;

            backdrop-filter:blur(6px);
        }

        .player button{
            padding:8px 12px;

            border-radius:10px;
            border:1px solid rgba(255,255,255,.2);

            background:rgba(255,255,255,.08);

            color:#fff;

            cursor:pointer;
        }

        .player input[type=file]{
            display:none;
        }

        .error{
            position:fixed;

            left:10px;
            right:10px;
            bottom:70px;

            padding:10px;

            color:#ffd9f7;

            background:#260015;

            border:1px solid #ff8ae5;
            border-radius:10px;

            font:12px system-ui;

            display:none;
        }

    </style>

    <!-- =========================
         THREE.JS
    ========================== -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

    <!-- =========================
         CANVAS PRINCIPAL
    ========================== -->

    <canvas id="galaxy-canvas"></canvas>

    <!-- =========================
         TEXTO SUPERIOR
    ========================== -->

    <div class="pill">
        💛 FERNANDA, LA MUJER MÁS HERMOSA DEL UNIVERSO 💛
    </div>

    <!-- =========================
         CRÉDITOS
    ========================== -->

    <div class="attribution">
        Base: tlanex · Adaptación para Jotab 💫
    </div>

    <!-- =========================
         MENSAJE DE ERROR
    ========================== -->

    <div id="err" class="error"></div>

    <!-- =========================
         REPRODUCTOR
    ========================== -->

    <div class="player">

        <button id="playBtn">
            ▶︎
        </button>

        <span style="font-size:12px; opacity:.9;">
            Elige tu canción 💙🌹♥️
        </span>

        <input type="file"
            id="pickFile"
            accept="audio/*">

        <button id="pickBtn">
            Elegir canción
        </button>

        <audio id="audio" preload="auto">

            <source
                src="Somewhere Only We Know.mp3"
                type="audio/mpeg">

        </audio>

    </div>

    <!-- =========================
         EFECTOS
    ========================== -->

    <canvas id="fx"
        style="
            position:fixed;
            inset:0;
            pointer-events:none;
        ">
    </canvas>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        (function(){

            // =========================
            // ELEMENTOS
            // =========================

            const err = document.getElementById('err');

            const audio = document.getElementById('audio');

            const playBtn = document.getElementById('playBtn');

            const pickBtn = document.getElementById('pickBtn');

            const pickFile = document.getElementById('pickFile');

            // =========================
            // ERROR
            // =========================

            function showError(msg){

                err.textContent = msg;

                err.style.display = 'block';
            }

            // =========================
            // AUDIO
            // =========================

            playBtn.onclick = async () => {

                try{

                    if(audio.paused){

                        await audio.play();

                        playBtn.textContent = '⏸︎';

                    }else{

                        audio.pause();

                        playBtn.textContent = '▶︎';
                    }

                }catch(e){

                    showError(
                        'Si no se escucha, toca "Elegir canción".'
                    );
                }
            };

            // Auto play al tocar pantalla

            document.addEventListener(
                "click",
                async () => {

                    try{

                        await audio.play();

                        playBtn.textContent = '⏸︎';

                    }catch(e){}
                },

                { once:true }
            );

            // Elegir archivo MP3

            pickBtn.onclick = () => pickFile.click();

            pickFile.onchange = () => {

                if(pickFile.files && pickFile.files[0]){

                    const url =
                        URL.createObjectURL(
                            pickFile.files[0]
                        );

                    audio.src = url;

                    audio.play()
                        .then(() => {

                            playBtn.textContent = '⏸︎';

                        })
                        .catch(() => {});
                }
            };

            // =========================
            // WEBGL CHECK
            // =========================

            try{

                const test =
                    document.createElement('canvas')
                    .getContext('webgl')

                    ||

                    document.createElement('canvas')
                    .getContext('experimental-webgl');

                if(!test){

                    throw new Error();
                }

            }catch(e){

                showError(
                    'WebGL no está disponible.'
                );

                return;
            }

            // =========================
            // THREE.JS
            // =========================

            const canvas =
                document.getElementById(
                    'galaxy-canvas'
                );

            const renderer =
                new THREE.WebGLRenderer({

                    canvas,
                    antialias:true
                });

            renderer.setPixelRatio(
                Math.min(
                    2,
                    window.devicePixelRatio || 1
                )
            );

            renderer.setSize(
                window.innerWidth,
                window.innerHeight
            );

            // =========================
            // ESCENA
            // =========================

            const scene = new THREE.Scene();

            const camera =
                new THREE.PerspectiveCamera(

                    75,

                    window.innerWidth /
                    window.innerHeight,

                    0.1,

                    2000
                );

            const controls =
                new THREE.OrbitControls(
                    camera,
                    renderer.domElement
                );

            controls.enableDamping = true;

            // =========================
            // CÁMARA
            // =========================

            camera.position.set(0,22,75);

            // =========================
            // ANIMACIÓN
            // =========================

            function animate(){

                requestAnimationFrame(animate);

                controls.update();

                renderer.render(scene, camera);
            }

            animate();

        })();

    </script>

</body>
</html>
