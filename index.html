```html
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Galaxia</title>

<style>

html,body{
    margin:0;
    overflow:hidden;
    background:black;
    height:100%;
    font-family:Arial;
}

#galaxy-canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
}

.pill{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    padding:10px 18px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    z-index:20;
}

.player{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    align-items:center;
    background:rgba(0,0,0,.4);
    padding:10px 15px;
    border-radius:15px;
    color:white;
    z-index:20;
    backdrop-filter:blur(10px);
}

.player button{
    background:#ffffff15;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

<canvas id="galaxy-canvas"></canvas>

<div class="pill">
💛 FERNANDA, LA MUJER MÁS HERMOSA DEL UNIVERSO 💛
</div>

<div class="player">

<button id="playBtn">
▶
</button>

<span>
Somewhere Only We Know 🎵
</span>

<audio id="audio" loop>
<source src="somewhere_only_we_know.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const canvas =
document.getElementById("galaxy-canvas");

const renderer =
new THREE.WebGLRenderer({
    canvas,
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    window.devicePixelRatio
);

const scene = new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    2000
);

camera.position.set(0,20,80);

const controls =
new THREE.OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;

const galaxy = new THREE.Group();

scene.add(galaxy);

const starGeometry =
new THREE.BufferGeometry();

const starCount = 15000;

const positions =
new Float32Array(starCount * 3);

for(let i=0;i<starCount;i++){

    const radius =
    Math.random() * 80;

    const angle =
    radius * 0.25;

    const branch =
    (i % 5) * ((Math.PI * 2)/5);

    const randomX =
    (Math.random()-.5) * 6;

    const randomY =
    (Math.random()-.5) * 2;

    const randomZ =
    (Math.random()-.5) * 6;

    positions[i*3] =
    Math.cos(angle + branch)
    * radius + randomX;

    positions[i*3+1] =
    randomY;

    positions[i*3+2] =
    Math.sin(angle + branch)
    * radius + randomZ;
}

starGeometry.setAttribute(
    'position',
    new THREE.BufferAttribute(
        positions,
        3
    )
);

const starMaterial =
new THREE.PointsMaterial({
    color:0xffffff,
    size:0.15,
    transparent:true,
    opacity:0.9,
    blending:THREE.AdditiveBlending
});

const stars =
new THREE.Points(
    starGeometry,
    starMaterial
);

galaxy.add(stars);

const phrases = [
"TE AMO 💛",
"FERNANDA ✨",
"HERMOSA 🌸",
"MI NIÑA HERMOSA 💫",
"MI CIELO 🌌",
"MI TODO 💖",
"MI VIDA 💛",
"MI SONRISA FAVORITA 😊",
"MI AMADA 🌹",
"MI MUNDO ENTERO 🌍",
"ME ENCANTAS 😍",
"MI LUGAR SEGURO 🌷",
"ERES MI TODO 💖",
"ERES PERFECTA 💫",
"ERES PRECIOSA 🌺",
"MI ALEGRÍA 🌈",
"CORAZÓN DE MELÓN ✨",
"TE ELEGIRÍA SIEMPRE 💕",
"MI MUSA 🌠",
"FERNANDA ✨",
"TE AMO 💛"

];

function createTextSprite(text){

    const canvas =
    document.createElement("canvas");

    canvas.width = 1024;
    canvas.height = 256;

    const ctx =
    canvas.getContext("2d");

    ctx.fillStyle = "white";

    ctx.font =
    "bold 80px Arial";

    ctx.textAlign = "center";

    ctx.shadowColor = "#ff99ff";

    ctx.shadowBlur = 20;

    ctx.fillText(
        text,
        512,
        130
    );

    const texture =
    new THREE.CanvasTexture(canvas);

    const material =
    new THREE.SpriteMaterial({
        map:texture,
        transparent:true
    });

    const sprite =
    new THREE.Sprite(material);

    return sprite;
}

for(let i=0;i<150;i++){

    const text =
    phrases[
        i % phrases.length
    ];

    const sprite =
    createTextSprite(text);

    const radius =
    Math.random() * 70;

    const angle =
    Math.random() * Math.PI * 2;

    sprite.position.set(
        Math.cos(angle) * radius,
        (Math.random()-.5)*10,
        Math.sin(angle) * radius
    );

    sprite.scale.set(
        15,
        4,
        1
    );

    galaxy.add(sprite);
}

const coreGeometry =
new THREE.SphereGeometry(
    8,
    64,
    64
);

const coreMaterial =
new THREE.MeshBasicMaterial({
    color:0xffccff
});

const core =
new THREE.Mesh(
    coreGeometry,
    coreMaterial
);

scene.add(core);

window.addEventListener(
'resize',
()=>{

    camera.aspect =
    window.innerWidth /
    window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

function animate(){

    requestAnimationFrame(
        animate
    );

    galaxy.rotation.y += 0.0015;

    core.rotation.y += 0.01;

    controls.update();

    renderer.render(
        scene,
        camera
    );
}

animate();

const audio =
document.getElementById("audio");

const playBtn =
document.getElementById("playBtn");

audio.volume = 1;

playBtn.onclick = async ()=>{

    try{

        if(audio.paused){

            await audio.play();

            playBtn.innerHTML="⏸";

        }else{

            audio.pause();

            playBtn.innerHTML="▶";
        }

    }catch(err){

        console.log(err);

        alert(
            "No se pudo reproducir el audio."
        );
    }
};

</script>

</body>
</html>
